# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=5000

# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/patient_data_manager?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:ljy123}

# ===================================================================
# MYBATIS CONFIGURATION
# ===================================================================
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
logging.level.com.database.mico_database.mapper=DEBUG

# ===================================================================
# REDIS CONFIGURATION
# ===================================================================
spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.database=0
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# ===================================================================
# RABBITMQ CONFIGURATION
# Disabled for local-only mode. Set app.rabbitmq.enabled=true to re-enable.
# ===================================================================
app.rabbitmq.enabled=false

# ===================================================================
# MODEL SERVICE CONFIGURATION
# app.model.enabled=false keeps the UI in "model not ready" mode.
# When the Python inference service is running, set it to true.
# ===================================================================
app.model.enabled=true
app.model.service-url=http://localhost:5001
