<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>患者检索 - Mico 医疗分析平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/comon0.css}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand navbar-brand-custom" th:href="@{/}">
                <i class="bi bi-activity"></i> Mico 医疗分析平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" th:href="@{/}">数据总览</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom active" th:href="@{/search_patient}">患者检索</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" th:href="@{/disease_prediction}">预测分析</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="page-shell search-stage">
        <section class="page-hero fade-in-up">
            <div class="text-center mx-auto" style="max-width: 920px; position: relative; z-index: 1;">
                <span class="eyebrow justify-content-center">患者检索</span>
                <h1 class="hero-title mx-auto" style="max-width: 10ch;">患者检索 <span class="muted">快速定位样本</span></h1>
                <p class="hero-description mx-auto">
                    支持按编号、姓名或疾病检索。
                </p>
                <div class="pill-row justify-content-center">
                    <span class="hero-chip"><i class="bi bi-upc-scan"></i>编号</span>
                    <span class="hero-chip"><i class="bi bi-person-vcard"></i>姓名</span>
                    <span class="hero-chip"><i class="bi bi-virus"></i>疾病</span>
                </div>

                <div class="search-card mt-4 fade-in-up" style="animation-delay: 0.08s;">
                    <form th:action="@{/search_patient/result}" method="POST">
                        <div class="search-row">
                            <div class="search-input-wrap">
                                <i class="bi bi-search text-secondary"></i>
                                <input type="text"
                                       class="form-control"
                                       name="query_value"
                                       placeholder="请输入患者编号、姓名或疾病名称..."
                                       required>
                            </div>

                            <select class="form-select search-select" name="query_type" required>
                                <option value="id" selected>患者编号</option>
                                <option value="name">姓名</option>
                                <option value="disease">疾病</option>
                            </select>

                            <button type="submit" class="btn btn-primary" style="width: 100%; min-height: 62px;">
                                <i class="bi bi-arrow-right"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="quick-pills fade-in-up" style="animation-delay: 0.16s;">
                    <form action="/analyze" method="post" target="_blank" class="m-0">
                        <input type="hidden" name="patient_id" value="P001">
                        <button type="submit" class="btn btn-light">
                            <i class="bi bi-stars me-2"></i>分析示例
                        </button>
                    </form>
                    <a th:href="@{/}" class="btn btn-light">
                        <i class="bi bi-speedometer2 me-2"></i>返回总览
                    </a>
                    <a th:href="@{/disease_prediction}" class="btn btn-light">
                        <i class="bi bi-cpu me-2"></i>进入预测分析
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
